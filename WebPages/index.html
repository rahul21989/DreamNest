<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DreamNest</title>
  <style>
    :root {
      --bg: #0c0825;
      --surface: #1a1255;
      --accent: #7c3aed;
      --accent-light: #a78bfa;
      --border: rgba(167,139,250,0.2);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: #e9d5ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 36px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .tagline { color: var(--accent-light); font-size: 16px; margin-bottom: 48px; }
    .links { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 320px; }
    .links a {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      text-decoration: none;
      color: #e9d5ff;
      font-size: 15px;
      font-weight: 500;
      transition: border-color 0.2s;
    }
    .links a:hover { border-color: var(--accent-light); }
    .links a .ico { font-size: 22px; }
    .links a .arrow { margin-left: auto; opacity: 0.5; font-size: 13px; }
    .badge {
      margin-top: 40px;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      color: #fff;
      padding: 12px 28px;
      border-radius: 25px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
    }
    footer { margin-top: 48px; color: #6b7280; font-size: 13px; }
  </style>
</head>
<body>
  <div class="icon">🌙</div>
  <h1>DreamNest</h1>
  <p class="tagline">Soothing lullabies & bedtime stories for little ones</p>

  <div class="links">
    <a href="support.html">
      <span class="ico">🆘</span>
      Help & Support
      <span class="arrow">›</span>
    </a>
    <a href="privacy.html">
      <span class="ico">🔒</span>
      Privacy Policy
      <span class="arrow">›</span>
    </a>
  </div>

  <a class="badge" href="https://apps.apple.com/app/dreamnest/id000000000" target="_blank">
    Download on the App Store
  </a>

  <footer>© 2026 DreamNest · goyal021989@gmail.com</footer>
</body>
</html>
